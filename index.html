<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BMI calculator</title>
</head>
<body>
    <form class="wrapper">

        <h1>BMI Calculator</h1>
        <label for="textbox-height" id="text-box-height">Height (cm): </label>
        <input type="text" id="textbox-height" min="1">
        <br>
        <label for="textbox-weight" id="text-box-weight">Weight (kg): </label>
        <input type="text" id="textbox-weight" min="1">
        <br>

        <div class="radio-wrapper">
            <input type="radio" id="gender-male" name="gender">
            <label>Male</label>
            <br>
            <input type="radio" id="gender-female" name="gender">
            <label>Female</label>
        </div>
        <br>

        <button type="button" onclick="bmiCalculation()">Submit</button>
        <p id="result"></p>
        <p id="bmi-category"></p>

    </form>
    


    <script src="index.js"></script>
</body>
</html>
